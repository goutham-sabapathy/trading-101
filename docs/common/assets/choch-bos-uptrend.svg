<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" font-family="'Space Grotesk','Avenir Next',Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="758" height="408" rx="14" fill="#fffdf7" stroke="#d8d2c2"/>

  <text x="30" y="38" font-size="20" font-weight="700" fill="#172026">Uptrend &#8212; BOS continues, CHoCH reverses</text>
  <text x="30" y="60" font-size="13" fill="#5b646b">Higher highs and higher lows. Each new high that breaks the prior high is a BOS (continuation).</text>
  <text x="30" y="78" font-size="13" fill="#5b646b">When price instead breaks <tspan font-weight="700">below the last higher low</tspan>, structure flips: that break is the CHoCH (reversal).</text>

  <!-- dashed reference levels -->
  <line x1="200" y1="200" x2="430" y2="200" stroke="#0e7a78" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="206" y="194" font-size="11" fill="#0e7a78">prior high &#8594; broken by HH (BOS)</text>

  <line x1="335" y1="255" x2="650" y2="255" stroke="#c7672f" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="540" y="249" font-size="11" fill="#c7672f">last HL &#8594; broken down (CHoCH)</text>

  <!-- price path: uptrend (green) -->
  <polyline points="70,345 140,250 200,290 270,200 335,255 405,150" fill="none" stroke="#14854f" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- price path: reversal (red) -->
  <polyline points="405,150 480,210 575,300 645,320" fill="none" stroke="#bf3341" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- swing dots -->
  <circle cx="200" cy="290" r="4" fill="#14854f"/>
  <circle cx="270" cy="200" r="4" fill="#14854f"/>
  <circle cx="335" cy="255" r="4" fill="#14854f"/>
  <circle cx="405" cy="150" r="4" fill="#14854f"/>
  <circle cx="480" cy="210" r="4" fill="#c7672f"/>

  <!-- swing labels -->
  <text x="190" y="312" font-size="12" font-weight="700" fill="#14854f">HL</text>
  <text x="258" y="190" font-size="12" font-weight="700" fill="#14854f">HH</text>
  <text x="325" y="277" font-size="12" font-weight="700" fill="#14854f">HL</text>
  <text x="395" y="140" font-size="12" font-weight="700" fill="#14854f">HH</text>
  <text x="472" y="202" font-size="12" font-weight="700" fill="#c7672f">LH</text>

  <!-- BOS callouts -->
  <text x="285" y="178" font-size="13" font-weight="700" fill="#0e7a78">BOS</text>
  <text x="420" y="128" font-size="13" font-weight="700" fill="#0e7a78">BOS</text>

  <!-- CHoCH callout -->
  <circle cx="528" cy="255" r="6" fill="none" stroke="#c7672f" stroke-width="2"/>
  <text x="540" y="290" font-size="14" font-weight="700" fill="#c7672f">CHoCH</text>

  <!-- legend -->
  <line x1="30" y1="386" x2="58" y2="386" stroke="#14854f" stroke-width="3"/>
  <text x="64" y="390" font-size="11" fill="#5b646b">uptrend (continuation)</text>
  <line x1="225" y1="386" x2="253" y2="386" stroke="#bf3341" stroke-width="3"/>
  <text x="259" y="390" font-size="11" fill="#5b646b">reversal leg</text>
  <text x="360" y="390" font-size="11" font-weight="700" fill="#0e7a78">BOS</text>
  <text x="394" y="390" font-size="11" fill="#5b646b">= same-direction break</text>
  <text x="560" y="390" font-size="11" font-weight="700" fill="#c7672f">CHoCH</text>
  <text x="604" y="390" font-size="11" fill="#5b646b">= opposite break</text>
</svg>
