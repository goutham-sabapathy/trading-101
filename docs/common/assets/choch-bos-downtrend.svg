<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 410" font-family="'Space Grotesk','Avenir Next',Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="758" height="408" rx="14" fill="#fffdf7" stroke="#d8d2c2"/>

  <text x="30" y="38" font-size="20" font-weight="700" fill="#172026">Downtrend &#8212; BOS continues, CHoCH reverses</text>
  <text x="30" y="60" font-size="13" fill="#5b646b">Lower lows and lower highs. Each new low that breaks the prior low is a BOS (continuation).</text>
  <text x="30" y="78" font-size="13" fill="#5b646b">When price instead breaks <tspan font-weight="700">above the last lower high</tspan>, structure flips: that break is the CHoCH (reversal).</text>

  <!-- dashed reference levels -->
  <line x1="200" y1="210" x2="430" y2="210" stroke="#0e7a78" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="206" y="204" font-size="11" fill="#0e7a78">prior low &#8594; broken by LL (BOS)</text>

  <line x1="335" y1="155" x2="650" y2="155" stroke="#c7672f" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="540" y="149" font-size="11" fill="#c7672f">last LH &#8594; broken up (CHoCH)</text>

  <!-- price path: downtrend (red) -->
  <polyline points="70,120 140,215 200,175 270,265 335,210 405,300" fill="none" stroke="#bf3341" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- price path: reversal (green) -->
  <polyline points="405,300 480,240 575,150 645,130" fill="none" stroke="#14854f" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- swing dots -->
  <circle cx="200" cy="175" r="4" fill="#bf3341"/>
  <circle cx="270" cy="265" r="4" fill="#bf3341"/>
  <circle cx="335" cy="210" r="4" fill="#bf3341"/>
  <circle cx="405" cy="300" r="4" fill="#bf3341"/>
  <circle cx="480" cy="240" r="4" fill="#14854f"/>

  <!-- swing labels -->
  <text x="190" y="166" font-size="12" font-weight="700" fill="#bf3341">LH</text>
  <text x="258" y="285" font-size="12" font-weight="700" fill="#bf3341">LL</text>
  <text x="325" y="201" font-size="12" font-weight="700" fill="#bf3341">LH</text>
  <text x="395" y="320" font-size="12" font-weight="700" fill="#bf3341">LL</text>
  <text x="472" y="232" font-size="12" font-weight="700" fill="#14854f">HL</text>

  <!-- BOS callouts -->
  <text x="285" y="288" font-size="13" font-weight="700" fill="#0e7a78">BOS</text>
  <text x="420" y="322" font-size="13" font-weight="700" fill="#0e7a78">BOS</text>

  <!-- CHoCH callout -->
  <circle cx="570" cy="155" r="6" fill="none" stroke="#c7672f" stroke-width="2"/>
  <text x="582" y="138" font-size="14" font-weight="700" fill="#c7672f">CHoCH</text>

  <!-- legend -->
  <line x1="30" y1="386" x2="58" y2="386" stroke="#bf3341" stroke-width="3"/>
  <text x="64" y="390" font-size="11" fill="#5b646b">downtrend (continuation)</text>
  <line x1="235" y1="386" x2="263" y2="386" stroke="#14854f" stroke-width="3"/>
  <text x="269" y="390" font-size="11" fill="#5b646b">reversal leg</text>
  <text x="370" y="390" font-size="11" font-weight="700" fill="#0e7a78">BOS</text>
  <text x="404" y="390" font-size="11" fill="#5b646b">= same-direction break</text>
  <text x="570" y="390" font-size="11" font-weight="700" fill="#c7672f">CHoCH</text>
  <text x="614" y="390" font-size="11" fill="#5b646b">= opposite break</text>
</svg>
