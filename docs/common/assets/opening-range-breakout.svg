<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="'Space Grotesk','Avenir Next',Helvetica,Arial,sans-serif">
  <rect x="1" y="1" width="758" height="378" rx="14" fill="#fffdf7" stroke="#d8d2c2"/>
  <text x="30" y="34" font-size="18" font-weight="700" fill="#172026">Opening-range breakout &#8212; bullish above range high</text>

  <!-- session range box -->
  <rect x="80" y="170" width="250" height="80" fill="rgba(199,103,47,0.10)" stroke="#c7672f" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="190" y="215" font-size="12" font-weight="700" fill="#c7672f" text-anchor="middle">SESSION RANGE</text>
  <text x="190" y="232" font-size="10" fill="#5b646b" text-anchor="middle">first 15&#8211;30 min</text>

  <!-- range high / low levels -->
  <line x1="80" y1="170" x2="690" y2="170" stroke="#172026" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="694" y="174" font-size="11" font-weight="700" fill="#172026">HIGH</text>
  <line x1="80" y1="250" x2="430" y2="250" stroke="#172026" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="38" y="254" font-size="11" font-weight="700" fill="#172026">LOW</text>

  <!-- stop level -->
  <line x1="330" y1="278" x2="690" y2="278" stroke="#bf3341" stroke-width="2"/>
  <text x="500" y="296" font-size="11" font-weight="700" fill="#bf3341">STOP &#183; below range low</text>

  <!-- target level -->
  <line x1="500" y1="95" x2="690" y2="95" stroke="#14854f" stroke-width="2"/>
  <text x="500" y="86" font-size="11" font-weight="700" fill="#14854f">TARGET &#183; range height &#215; 1&#8211;2</text>

  <!-- price path: chop in range, then break up -->
  <polyline points="80,230 120,195 160,240 200,200 240,235 280,205 320,178 360,150 430,150 510,115 600,100 660,98"
            fill="none" stroke="#33424d" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- entry marker at breakout -->
  <circle cx="360" cy="150" r="8" fill="#0e7a78"/>
  <text x="360" y="155" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">E</text>
  <text x="372" y="138" font-size="11" font-weight="700" fill="#0e7a78">BREAKOUT &#183; close above HIGH</text>

  <!-- legend -->
  <circle cx="92" cy="338" r="6" fill="#0e7a78"/><text x="103" y="342" font-size="11" fill="#5b646b">E = entry (close beyond range)</text>
  <circle cx="300" cy="338" r="6" fill="#bf3341"/><text x="311" y="342" font-size="11" fill="#5b646b">S = stop</text>
  <circle cx="400" cy="338" r="6" fill="#14854f"/><text x="411" y="342" font-size="11" fill="#5b646b">T = target</text>
</svg>
