<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="'Space Grotesk','Avenir Next',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="rh-ink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5b646b"/></marker>
    <marker id="rh-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#bf3341"/></marker>
  </defs>

  <rect x="1" y="1" width="758" height="428" rx="14" fill="#fffdf7" stroke="#d8d2c2"/>
  <text x="30" y="36" font-size="19" font-weight="700" fill="#172026">Market regimes &#8212; state transitions</text>
  <text x="30" y="56" font-size="12" fill="#5b646b">A Markov view: each step the regime stays or switches. A high self-loop probability = a "sticky" regime.</text>

  <!-- state nodes -->
  <circle cx="160" cy="230" r="58" fill="rgba(20,133,79,0.10)" stroke="#14854f" stroke-width="2"/>
  <text x="160" y="226" font-size="15" font-weight="700" fill="#172026" text-anchor="middle">Bull</text>
  <text x="160" y="245" font-size="10" fill="#5b646b" text-anchor="middle">trend up</text>

  <circle cx="400" cy="230" r="58" fill="rgba(199,103,47,0.10)" stroke="#c7672f" stroke-width="2"/>
  <text x="400" y="226" font-size="15" font-weight="700" fill="#172026" text-anchor="middle">Sideways</text>
  <text x="400" y="245" font-size="10" fill="#5b646b" text-anchor="middle">range</text>

  <circle cx="640" cy="230" r="58" fill="rgba(191,51,65,0.10)" stroke="#bf3341" stroke-width="2"/>
  <text x="640" y="226" font-size="15" font-weight="700" fill="#172026" text-anchor="middle">Bear</text>
  <text x="640" y="245" font-size="10" fill="#5b646b" text-anchor="middle">trend down</text>

  <!-- transitions Bull <-> Sideways -->
  <path d="M222,212 C280,192 320,192 340,206" fill="none" stroke="#5b646b" stroke-width="1.6" marker-end="url(#rh-ink)"/>
  <path d="M338,254 C320,268 280,268 222,250" fill="none" stroke="#5b646b" stroke-width="1.6" marker-end="url(#rh-ink)"/>
  <!-- transitions Sideways <-> Bear -->
  <path d="M462,212 C520,192 560,192 580,206" fill="none" stroke="#5b646b" stroke-width="1.6" marker-end="url(#rh-ink)"/>
  <path d="M578,254 C560,268 520,268 462,250" fill="none" stroke="#5b646b" stroke-width="1.6" marker-end="url(#rh-ink)"/>

  <!-- persistence self-loops -->
  <path d="M132,178 C112,138 208,138 188,178" fill="none" stroke="#14854f" stroke-width="1.6" marker-end="url(#rh-ink)"/>
  <text x="160" y="132" font-size="10" fill="#5b646b" text-anchor="middle">stay (persistence)</text>
  <path d="M372,178 C352,138 448,138 428,178" fill="none" stroke="#c7672f" stroke-width="1.6" marker-end="url(#rh-ink)"/>
  <text x="400" y="132" font-size="10" fill="#5b646b" text-anchor="middle">stay</text>
  <path d="M612,178 C592,138 688,138 668,178" fill="none" stroke="#bf3341" stroke-width="1.8" marker-end="url(#rh-red)"/>
  <text x="640" y="132" font-size="10" font-weight="700" fill="#bf3341" text-anchor="middle">sticky (&gt; 75%)</text>

  <!-- hard gate callout -->
  <rect x="430" y="330" width="300" height="60" rx="8" fill="rgba(191,51,65,0.08)" stroke="#bf3341" stroke-width="1"/>
  <text x="445" y="352" font-size="12" font-weight="700" fill="#bf3341">Hard gate &#183; sticky Bear</text>
  <text x="445" y="370" font-size="10.5" fill="#5b646b">no bullish premium selling; defined-risk only,</text>
  <text x="445" y="384" font-size="10.5" fill="#5b646b">reduced size. See risk &amp; position sizing.</text>

  <text x="30" y="356" font-size="11" fill="#5b646b">Persistence =</text>
  <text x="30" y="372" font-size="11" fill="#5b646b">the self-loop</text>
  <text x="30" y="388" font-size="11" fill="#5b646b">probability.</text>
</svg>
